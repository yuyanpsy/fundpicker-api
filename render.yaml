services:
  - type: web
    name: fundpicker-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Cron job: 每5分钟跑一批500只基金预测（独立进程，不依赖web服务）
  # 每次从 Supabase 读断点，预测500只新基金，保存后退出
  # 5分钟后再次启动继续下一批，直到全部完成
  - type: cron
    name: fundpicker-batch-predict
    runtime: python
    plan: free
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && python batch_predict_cron.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Cron job: 每天 9:30 UTC (北京17:30 收盘后) 存快照
  - type: cron
    name: fundpicker-daily-snapshot
    runtime: python
    plan: free
    schedule: "30 9 * * *"
    buildCommand: pip install requests
    startCommand: python app/daily_snapshot.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Cron job: 每天 10:00 UTC 对账 30 天前的快照 + 聚合胜率
  - type: cron
    name: fundpicker-daily-verify
    runtime: python
    plan: free
    schedule: "0 10 * * *"
    buildCommand: pip install requests
    startCommand: python app/daily_verify.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
