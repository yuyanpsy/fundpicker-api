services:
  - type: web
    name: fundpicker-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Cron job: 每5分钟唤醒Render，确保预测持续运行直到完成
  - type: cron
    name: fundpicker-keepalive
    runtime: python
    plan: free
    schedule: "*/5 * * * *"
    buildCommand: pip install requests
    startCommand: python -c "import requests,sys; r=requests.get('https://fundpicker-api.onrender.com/trigger-update',timeout=30); print(r.text[:200]); sys.exit(0)"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Cron job: 每天 9:30 UTC (北京17:30 收盘后) 存快照
  # 独立运行，不依赖 web 服务状态，直接从 Supabase 读预测 + 东方财富拉 nav
  - type: cron
    name: fundpicker-daily-snapshot
    runtime: python
    plan: free
    schedule: "30 9 * * *"
    buildCommand: pip install requests
    startCommand: python app/daily_snapshot.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Cron job: 每天 10:00 UTC 对账 30 天前的快照 + 聚合胜率
  - type: cron
    name: fundpicker-daily-verify
    runtime: python
    plan: free
    schedule: "0 10 * * *"
    buildCommand: pip install requests
    startCommand: python app/daily_verify.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
