services:
  - type: web
    name: fundpicker-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Cron job: 每5分钟唤醒Render，确保预测持续运行直到完成
  - type: cron
    name: fundpicker-keepalive
    runtime: python
    plan: free
    schedule: "*/5 * * * *"
    buildCommand: pip install requests
    startCommand: python -c "import requests,sys; r=requests.get('https://fundpicker-api.onrender.com/trigger-update',timeout=30); print(r.text[:200]); sys.exit(0)"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
