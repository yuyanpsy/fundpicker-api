name: Daily Snapshot

on:
  schedule:
    # 北京时间每天 17:30（UTC 9:30），A股收盘后
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements-cron.txt'

      - name: Install dependencies
        run: pip install -r requirements-cron.txt

      - name: Run daily snapshot
        run: python app/daily_snapshot.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
