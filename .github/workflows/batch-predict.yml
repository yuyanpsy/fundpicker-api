name: Batch Predict Funds

on:
  schedule:
    # 北京时间每天 9:00（UTC 1:00）运行
    # TODO: 数据填满后改回 '0 1 * * 1-5'（仅交易日）
    - cron: '0 1 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 50 # GitHub Actions 单次上限6小时，预留缓冲
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements-cron.txt'

      - name: Install dependencies
        run: pip install -r requirements-cron.txt

      - name: Run batch prediction
        run: cd app && python batch_predict_cron.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Upload prediction log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-predict-log-${{ github.run_number }}
          path: |
            predict_*.log
          retention-days: 7
          if-no-files-found: ignore
